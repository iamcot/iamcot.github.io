---
layout: default
---
<div class="posts">
    <ul class="posts__list">
        {% for post in site.posts %}
        <li>
            <a href="{{ post.url }}">
            <h2 class="posts__title">{{ post.title }}</h2>
            <span class="posts__date">{{ post.date | date: "%B %e, %Y" }}</span>
        </a>
        </li>
        {% endfor %}
    </ul>

</div>
